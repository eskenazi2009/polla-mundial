name: Build Polla dashboard

on:
  push:
    branches: [main]             # rebuild immediately whenever the code changes
  schedule:
    # Every 30 min only between 1:00pm and 3:00am Panama/EST (UTC-5). Cron is in UTC.
    - cron: '*/30 18-23 * * *'   # Panama 1:00pm - 6:30pm  (UTC 18:00-23:30)
    - cron: '*/30 0-7 * * *'     # Panama 7:00pm - 2:30am  (UTC 00:00-07:30)
    - cron: '0 8 * * *'          # Panama 3:00am           (UTC 08:00)
  workflow_dispatch: {}          # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate dashboard
        shell: pwsh
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          POLLA_EMAIL: ${{ secrets.POLLA_EMAIL }}
          POLLA_PASSWORD: ${{ secrets.POLLA_PASSWORD }}
        run: pwsh ./build.ps1 -OutDir ./public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
